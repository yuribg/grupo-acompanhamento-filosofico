<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grupo de Acompanhamento Filosófico</title>
    <link rel="icon" type="image/png" href="./imagens/acropole.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-container">
        <div class="login-box">
            <img src="./imagens/acropole.png" alt="Símbolo da Acrópole" class="login-logo">
            <h2>Grupo de Acompanhamento Filosófico</h2>
            <p class="login-subtitle">Digite a senha para continuar</p>

            <form id="login-form" onsubmit="validateLogin(event)">
                <input
                    type="password"
                    id="password-input"
                    placeholder="Senha"
                    required
                    autocomplete="off"
                >
                <button type="submit" class="login-button">Entrar</button>
            </form>

            <p id="login-error" class="login-error" style="display: none;">Senha incorreta!</p>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script>
    window.addEventListener('load', function() {
        if (isAuthenticated()) {
            window.location.href = 'etapas.html';
        }
    });
</script>

</body>
</html>
